<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>YAHYA LIVE SAT-TRACKER 🛰️</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        body { background: #000; color: #0f0; font-family: monospace; margin: 0; overflow: hidden; }
        #map { height: 100vh; width: 100%; }
        .overlay { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.8); padding: 15px; border: 1px solid #0f0; z-index: 1000; pointer-events: none; }
        .status { color: #58a6ff; }
        
        /* 🎨 تأثير تلوين الأيقونة بالأخضر النيون */
        .leaflet-marker-icon {
            filter: invert(48%) sepia(79%) saturate(2476%) hue-rotate(86deg) brightness(118%) contrast(119%) !important;
        }
    </style>
</head>
<body>

    <div class="overlay">
        <h2>📡 رادار يحيى الحي</h2>
        <div id="sat-info">جاري الاتصال بقاعدة بيانات NORAD...</div>
        <p class="status">● تحديث حي كل 5 ثوانٍ</p>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
        // إعداد الخريطة
        var map = L.map('map').setView([20, 0], 2);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        // أيقونة القمر الصناعي
        var satIcon = L.icon({
            iconUrl: 'https://upload.wikimedia.org/wikipedia/commons/d/d0/International_Space_Station.svg',
            iconSize: [40, 40]
        });

        var marker = L.marker([0, 0], {icon: satIcon}).addTo(map);

        // وظيفة جلب البيانات الحقيقية لمحطة الفضاء الدولية (ISS)
        async function updateSatellite() {
            try {
                // استدعاء API حقيقي
                const response = await fetch('https://api.wheretheiss.at/v1/satellites/25544');
                const data = await response.json();
                
                const { latitude, longitude, velocity, altitude } = data;

                // 🛰️ تحديث مكان القمر على الخريطة
                marker.setLatLng([latitude, longitude]);
                
                // 🧭 الملاح الآلي (Auto-Pan): تحريك الخريطة لتظل في المركز
                map.panTo([latitude, longitude], {animate: true});

                // تحديث لوحة المعلومات
                document.getElementById('sat-info').innerHTML = `
                    <strong>الاسم:</strong> ISS (محطة الفضاء)<br>
                    <strong>خط العرض:</strong> ${latitude.toFixed(4)}<br>
                    <strong>خط الطول:</strong> ${longitude.toFixed(4)}<br>
                    <strong>السرعة:</strong> ${velocity.toFixed(2)} كم/س<br>
                    <strong>الارتفاع:</strong> ${altitude.toFixed(2)} كم
                `;
            } catch (error) {
                document.getElementById('sat-info').innerText = "خطأ في جلب البيانات الحية.";
            }
        }

        // تحديث الموقع كل 5 ثوانٍ
        setInterval(updateSatellite, 5000);
        updateSatellite();
    </script>
</body>
</html>
